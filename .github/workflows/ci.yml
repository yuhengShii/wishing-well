name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: 后端测试
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: |
          pip install -r backend/requirements.txt
          pip install pytest httpx

      - name: 后端单元测试
        run: pytest app/tests/ -v

  frontend-build:
    name: 前端构建
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: wishing-well-frontend/package-lock.json

      - name: 安装依赖
        run: npm install
        working-directory: wishing-well-frontend

      - name: ESLint 检查
        run: npm run lint || true
        working-directory: wishing-well-frontend

      - name: 构建小程序
        run: npm run build:weapp
        working-directory: wishing-well-frontend
